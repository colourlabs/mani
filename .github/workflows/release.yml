name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup Lua
        uses: leafo/gh-actions-lua@v13
        with:
          luaVersion: "5.4"

      - name: Setup LuaRocks
        uses: leafo/gh-actions-luarocks@v6

      - name: Install dependencies
        run: |
          luarocks install --only-deps rockspecs/mani-dev-1.rockspec
          luarocks install busted
          luarocks install luacheck

      - name: Lint
        run: luacheck src/ spec/

      - name: Run all tests
        run: busted spec/

      - name: Upload to LuaRocks
        env:
          LUAROCKS_API_KEY: ${{ secrets.LUAROCKS_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          version=${GITHUB_REF_NAME#v}
          sed -i "s|git+https://github.com/|git+https://x-access-token:${GITHUB_TOKEN}@github.com/|" \
            rockspecs/mani-${version}-1.rockspec
          luarocks upload rockspecs/mani-${version}-1.rockspec --api-key=$LUAROCKS_API_KEY

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "v${GITHUB_REF_NAME#v}" \
            --generate-notes
