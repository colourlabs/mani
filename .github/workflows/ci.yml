name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lua-version: ["5.1", "5.4", "5.5", "luajit-2.1"]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Lua
        uses: leafo/gh-actions-lua@v13
        with:
          luaVersion: ${{ matrix.lua-version }}

      - name: Setup LuaRocks
        uses: leafo/gh-actions-luarocks@v6

      - name: Install dependencies
        run: |
          luarocks install --only-deps rockspecs/mani-dev-1.rockspec
          luarocks install busted
          luarocks install luacheck

      - name: Lint
        run: luacheck src/ spec/

      - name: Test
        run: busted --exclude-tags=interactive,network spec/
